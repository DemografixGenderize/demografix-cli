version: 2
project_name: demografix

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: demografix
    main: .
    binary: demografix
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    mod_timestamp: "{{ .CommitTimestamp }}"
    ldflags:
      - -s -w
      - -X github.com/DemografixGenderize/demografix-cli/internal/version.Version={{ .Version }}

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

homebrew_casks:
  - name: demografix
    repository:
      owner: DemografixGenderize
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://genderize.io"
    description: "Command-line client for the Demografix APIs (genderize, agify, nationalize)"
    binaries:
      - demografix

release:
  github:
    owner: DemografixGenderize
    name: demografix-cli
  draft: false
  prerelease: auto
